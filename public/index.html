<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min Skolehverdag</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div id="start">
    <h1>Min Skolehverdag</h1>

    <p>Deltaker-ID</p>

    <input
      type="text"
      id="pid"
      placeholder="Skriv inn deltaker-ID">

    <br><br>

    <button id="nextBtn">
      Neste
    </button>
  </div>

  <div id="mode" style="display:none;">

    <h2>Velg spørreskjema</h2>

    <label>
      <input type="radio" name="m" value="med">
      Med karakterer
    </label>

    <br><br>

    <label>
      <input type="radio" name="m" value="uten">
      Uten karakterer
    </label>

    <br><br>

    <button id="startBtn">
      Start
    </button>

  </div>

  <div id="questionPage" style="display:none;">

    <p id="questionNumber"></p>

    <h2 id="questionText"></h2>

    <div id="answerArea"></div>

    <br><br>

    <button id="backBtn">
      Tilbake
    </button>

    <button id="questionNextBtn">
      Neste
    </button>

  </div>

  <div id="done" style="display:none;">
    <h2>Takk for deltakelsen!</h2>
    <p>Svarene dine er lagret.</p>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
